<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SDN KEJURON</title>
    <script type="text/javascript">
        // Redirect 404 to index.html for Single Page Application
        // This handles refreshes on sub-routes
        var base = '/website/';
        var path = window.location.pathname;
        
        // Only redirect if we are not already at the base path or if we are at a sub-route that needs handling
        if (path !== base && path !== base + 'index.html') {
            window.location.href = base;
        }
    </script>
</head>
<body>
    Redirecting to home...
</body>
</html>
