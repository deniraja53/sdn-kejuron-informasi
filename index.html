  <body>
    <div id="root"></div>
    <script>
      // Make window.fetch writable to prevent "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        if (typeof window !== 'undefined' && window.fetch) {
          try {
            var originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            // Silently fail if browser doesn't allow redefinition
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
